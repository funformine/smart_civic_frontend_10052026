    <div class="auth-container">
      <div class="card auth-card">
        <h2 class="text-neon">Login</h2>
        <p class="text-grey mb-1">Welcome back! Please login to your account.</p>
        
        <div *ngIf="errorMessage" class="alert alert-error">
          {{ errorMessage }}
        </div>
        
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label class="required-label">Username</label>
            <input type="text" formControlName="username" placeholder="Enter username">
            <div *ngIf="f['username'].touched && f['username'].errors" class="error-text">
              <span *ngIf="f['username'].errors['required']">Username is required</span>
              <span *ngIf="f['username'].errors['pattern']">Needs Uppercase, Lowercase, Number & Symbol</span>
            </div>
          </div>
          <div class="form-group">
            <label class="required-label">Password</label>
            <input type="password" formControlName="password" placeholder="Enter password">
            <div *ngIf="f['password'].touched && f['password'].errors" class="error-text">
              <span *ngIf="f['password'].errors['required']">Password is required</span>
              <span *ngIf="f['password'].errors['pattern']">Needs Uppercase, Lowercase, Number & Symbol</span>
            </div>
          </div>
          <button type="submit" class="btn-primary" [disabled]="loginForm.invalid || isLoading">
            <div class="btn-content">
              <span *ngIf="isLoading" class="spinner"></span>
              <span>{{ isLoading ? 'Logging in...' : 'Login' }}</span>
            </div>
          </button>
        </form>
        
        <p class="mt-1">Don't have an account? <a routerLink="/auth/register" class="text-neon">Register here</a></p>
      </div>
    </div>
  `,
